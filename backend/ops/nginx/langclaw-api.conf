server {
  listen 80;
  listen [::]:80;
  server_name api.langclaw.43-129-56-85.sslip.io;

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name api.langclaw.43-129-56-85.sslip.io;

  ssl_certificate /etc/letsencrypt/live/api.langclaw.43-129-56-85.sslip.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.langclaw.43-129-56-85.sslip.io/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
}
