server {
  listen 80;
  listen [::]:80;
  server_name 43-129-56-85.sslip.io;

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name 43-129-56-85.sslip.io;

  ssl_certificate /etc/letsencrypt/live/43-129-56-85.sslip.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/43-129-56-85.sslip.io/privkey.pem;

  location /seal/ {
    proxy_pass http://127.0.0.1:2024/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Request-Id, Client-Sdk-Type, Client-Sdk-Version, Content-Type" always;
    add_header Access-Control-Expose-Headers "x-keyserver-version" always;

    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location / {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
